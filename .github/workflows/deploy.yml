name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # cho phép chạy thủ công từ Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tạo js/config.js từ GitHub Secrets
      # config.js không có trong repo (đã gitignore)
      # Secrets được inject an toàn tại build time
      - name: Create config.js from secrets
        run: |
          cat > js/config.js << 'EOF'
          window.SUPABASE_URL  = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_ANON = '${{ secrets.SUPABASE_ANON }}';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
