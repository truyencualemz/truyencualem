<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>LemComics — Đọc Truyện</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8a96e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LemComics">
<link rel="apple-touch-icon" href="icons/icon.svg">
<style>
/* ── Theme CSS Variables ── */
:root {
  --bg-app:         #0f0f11;
  --bg-primary:     #18181c;
  --bg-secondary:   #111;
  --bg-tertiary:    #1a1a1e;
  --border:         #2a2a30;
  --text-primary:   #e8e6e0;
  --text-secondary: #aaa;
  --text-muted:     #555;
  --accent:         #c8a96e;
  --accent-dim:     #c8a96e11;
  --reader-bg:      #0a0a0b;
  --reader-text:    #d4d0c8;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg-app);color:var(--text-primary);transition:background .2s,color .2s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg-app)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{background:var(--bg-primary);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0px) 20px 0;height:calc(52px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-text{font-family:monospace;font-size:13px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.logo-sub{font-size:10px;color:var(--text-muted);margin-left:8px}
#header-right{display:flex;align-items:center;gap:10px}
.user-email{font-size:11px;color:var(--text-muted)}
#content{flex:1;overflow-y:auto;padding:20px}

/* ── Tabs ── */
#tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-shrink:0}
.tab-btn{padding:10px 18px;font-size:12px;cursor:pointer;color:var(--text-muted);border:none;background:transparent;border-bottom:2px solid transparent;font-family:inherit;transition:color .15s;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text-primary)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;white-space:nowrap;user-select:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#18181c}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted)}.btn-ghost:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.btn-danger{background:transparent;border:1px solid #3a2020;color:#e05555}.btn-danger:hover{background:#3a2020}
.btn-sm{padding:5px 11px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px}

/* ── Comic grid ── */
.comic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.comic-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:9px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.comic-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.comic-thumb{width:100%;aspect-ratio:2/3;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.comic-thumb img{width:100%;height:100%;object-fit:cover}
.comic-thumb-icon{font-size:28px;color:var(--border)}
.comic-info{padding:8px 10px}
.comic-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary)}
.comic-meta{font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{padding:1px 6px;border-radius:20px;font-size:9px}
.badge-genre{background:var(--bg-tertiary);color:var(--text-muted);border:1px solid var(--border)}

/* ── Section ── */
.section-title{font-family:monospace;font-size:13px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title span{font-size:10px;color:var(--text-muted);font-family:sans-serif;font-weight:400}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:13px;line-height:1.9}

/* ── Continue reading ── */
.continue-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.continue-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.continue-card:hover{border-color:var(--accent)}
.continue-thumb{width:44px;height:60px;border-radius:5px;background:var(--bg-secondary);object-fit:cover;flex-shrink:0}
.continue-thumb-icon{width:44px;height:60px;border-radius:5px;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.continue-info{flex:1;min-width:0}
.continue-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary)}
.continue-chap{font-size:11px;color:var(--accent);margin-top:3px}
.continue-time{font-size:10px;color:var(--text-muted);margin-top:2px}
.continue-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Bookmark ── */
.bookmark-list{display:flex;flex-direction:column;gap:8px}
.bookmark-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.bk-info{flex:1;min-width:0}
.bk-comic{font-size:12px;color:var(--text-muted);margin-bottom:2px}
.bk-chap{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary)}
.bk-note{font-size:11px;color:var(--text-muted);margin-top:3px;font-style:italic}
.bk-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Search ── */
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{width:100%;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:9px 12px 9px 34px;color:var(--text-primary);font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.search-bar input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none}

/* ── Genre pills ── */
.genre-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.genre-pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--text-muted);background:transparent;font-family:inherit;transition:all .15s}
.genre-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.genre-pill:hover{color:var(--text-primary);border-color:var(--text-muted)}

/* ── Reader ── */
#reader{position:fixed;inset:0;background:var(--reader-bg);z-index:200;display:none;flex-direction:column;padding-top:env(safe-area-inset-top,0px)}
.rbar{padding:0 12px;background:var(--bg-primary);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;height:46px;flex-shrink:0;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.rbar::-webkit-scrollbar{display:none}
.rtitle{font-family:monospace;font-size:11px;color:var(--accent);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.rbar-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.bk-btn{padding:5px 10px;font-size:10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:monospace;transition:all .15s}
.bk-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.mtog,.ltog{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;flex-shrink:0}
.mbtn,.lbtn{padding:5px 9px;font-size:10px;cursor:pointer;background:transparent;border:none;color:var(--text-muted);font-family:monospace;transition:all .15s}
.mbtn.active{background:var(--border);color:var(--text-primary)}
.lbtn.active{background:var(--accent);color:#18181c;font-weight:600}
.zoom-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.zoom-label{font-size:10px;color:var(--text-muted);font-family:monospace;white-space:nowrap}
.zoom-val{font-size:10px;color:var(--accent);font-family:monospace;min-width:34px;text-align:right}
input[type=range].zoom-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:linear-gradient(to right,var(--accent) var(--p,50%),var(--border) var(--p,50%));outline:none;cursor:pointer;flex-shrink:0}
input[type=range].zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.rnav{padding:6px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--bg-tertiary);display:flex;align-items:center;gap:6px;flex-shrink:0}
.rni{font-size:10px;color:var(--text-muted);font-family:monospace;min-width:76px;text-align:center}
.rscroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:12px;gap:2px;background:var(--reader-bg)}
.rpiw{max-width:680px;width:100%}
.rpl{font-size:9px;color:var(--border);font-family:monospace;margin-bottom:2px;align-self:flex-start;width:100%}
.rnoph{width:100%;aspect-ratio:3/4;background:var(--bg-secondary);border:1px dashed var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:11px;max-width:680px}
.rsplit{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.rcol{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bg-tertiary)}
.rcol:last-child{border-right:none}
.rchdr{padding:6px 10px;background:var(--bg-secondary);border-bottom:1px solid var(--bg-tertiary);font-size:10px;font-family:monospace;display:flex;align-items:center;gap:5px;flex-shrink:0;color:var(--text-muted)}
.rcs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;background:var(--reader-bg)}
.split-page{width:100%;display:flex;flex-direction:column;padding-bottom:6px}
.spl{font-size:8px;color:var(--border);font-family:monospace;padding:0 2px 2px;text-align:center}
.spno{width:100%;aspect-ratio:3/4;background:var(--bg-secondary);border:1px dashed var(--bg-tertiary);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:10px}
.spblank{width:100%;aspect-ratio:3/4;background:var(--reader-bg);border:1px dashed var(--bg-tertiary);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:9px}
.pdf-pages{display:flex;flex-direction:column;gap:0}
.pdf-pages canvas{height:auto;display:block}
.pdf-spin{display:flex;align-items:center;justify-content:center;padding:16px;color:var(--text-muted);font-size:10px;gap:8px;min-height:40px}
.pdf-spin::before{content:'';width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slide-up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
@keyframes scale-in{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
@keyframes slide-ltr{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
@keyframes slide-rtl{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
.anim-fade-up{animation:fade-up .22s cubic-bezier(.22,1,.36,1) both}
.anim-slide-up{animation:slide-up .28s cubic-bezier(.22,1,.36,1) both}
.anim-scale-in{animation:scale-in .22s cubic-bezier(.22,1,.36,1) both}
.anim-slide-ltr{animation:slide-ltr .2s cubic-bezier(.22,1,.36,1) both}
.anim-slide-rtl{animation:slide-rtl .2s cubic-bezier(.22,1,.36,1) both}
.chap-modal-box{transform-origin:center top}

/* ── Text reader ── */
.tbar-langs{padding:7px 14px;background:var(--bg-secondary);border-bottom:1px solid var(--bg-tertiary);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.lang-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:11px;user-select:none;transition:border-color .15s;flex-shrink:0;color:var(--text-muted)}
.lang-pill:has(input:checked){border-color:var(--accent)}
.lang-pill input{accent-color:var(--accent)}
#text-cols{flex:1;display:grid;overflow:hidden}
.text-col-wrap{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.text-col-wrap:last-child{border-right:none}
.text-col-hdr{padding:7px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);font-size:11px;display:flex;align-items:center;gap:6px;flex-shrink:0;color:var(--text-secondary)}
.text-col{flex:1;overflow-y:auto;padding:18px 22px;background:var(--bg-app)}
.tseg{padding:14px 0;border-bottom:1px solid var(--border)}
.tseg:last-child{border-bottom:none}
.tseg-note{font-size:10px;color:var(--text-muted);font-style:italic;margin-bottom:5px}
.tseg-content{font-size:15px;line-height:1.9;color:var(--reader-text);white-space:pre-wrap;word-break:break-word}
.anno-phrase{cursor:pointer;border-bottom:1.5px dashed var(--accent-dim);border-radius:2px;transition:background .12s}
.anno-phrase:hover{background:var(--accent-dim);border-bottom-color:var(--accent)}
.anno-tooltip{position:fixed;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:10px 14px;max-width:260px;min-width:120px;z-index:500;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none;display:none;font-size:12px}
.anno-tooltip-src{font-size:9px;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;font-family:monospace}
.anno-tooltip-row{margin-bottom:5px}
.anno-tooltip-lang{font-size:9px;color:var(--text-muted);margin-bottom:1px}
.anno-tooltip-text{font-size:13px;color:var(--text-primary);line-height:1.5}
.lt{font-size:9px;font-family:monospace;padding:1px 5px;border-radius:3px;display:inline-block}
.lvi{background:#1a2030;color:#6ab0f5;border:1px solid #2a3050}
.len{background:#1a2820;color:#6af59a;border:1px solid #2a4030}

/* ── Chapter modal ── */
#chap-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.chap-modal-box{background:var(--bg-primary);border:1px solid var(--border);border-radius:10px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.chap-modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chap-modal-title{font-family:monospace;font-size:13px;color:var(--accent)}
.chap-modal-list{overflow-y:auto;padding:8px}
.chap-item{padding:10px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s;color:var(--text-primary)}
.chap-item:hover{background:var(--bg-tertiary)}
.chap-item.last-read{background:#1a2030}
.chap-num{font-family:monospace;font-size:11px;color:var(--accent);min-width:40px}
.chap-title{font-size:12px;flex:1}
.chap-type{font-size:9px;color:var(--text-muted);padding:1px 5px;border-radius:3px;background:var(--bg-tertiary);border:1px solid var(--border)}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-msg{font-size:12px;color:var(--text-muted);font-family:monospace}
</style>
</head>
<body>
<script>window.IS_USER_PAGE = true;</script>
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="logo-text">MangaDesk</span>
      <span class="logo-sub">Đọc truyện</span>
    </div>
    <div id="header-right">
      <button class="btn btn-ghost btn-xs" data-theme-btn title="Đổi theme" id="theme-toggle-btn">🌙</button>
      <button class="btn btn-ghost btn-xs" id="profile-btn" style="display:flex;align-items:center;gap:6px">
        <span style="width:22px;height:22px;border-radius:50%;background:var(--bg-tertiary,var(--border));display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;overflow:hidden" id="user-avatar">?</span>
        <span id="user-display-name" style="font-size:11px;color:var(--text-muted,var(--text-muted));max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </button>
    </div>
  </div>

  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <div id="tabs" style="padding:0 20px">
      <button class="tab-btn active" data-tab="home">🏠 Khám phá</button>
      <button class="tab-btn" data-tab="continue">▶ Tiếp tục đọc</button>
      <button class="tab-btn" data-tab="follows">★ Theo dõi</button>
      <button class="tab-btn" data-tab="bookmarks">🔖 Bookmark</button>
      <button class="tab-btn" data-tab="account">👤 Tài khoản</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="reader"></div>
<div id="anno-tooltip" class="anno-tooltip"></div>
<div id="chap-modal"><div class="chap-modal-box" id="chap-modal-box"></div></div>
<div id="loading"><div class="spinner"></div><div class="loading-msg" id="loading-msg">Đang tải...</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/translate.js"></script>
<script src="js/pdf-module.js"></script>
<script src="js/user-db.js"></script>
<script src="js/announce.js"></script>
<script src="js/infinite-scroll.js"></script>
<script src="js/follow.js"></script>
<script src="js/reader-enhance.js"></script>
<script src="js/user-app.js"></script>
<script src="js/comments.js"></script>
<script src="js/donate.js"></script>
<script>
  initUser();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
