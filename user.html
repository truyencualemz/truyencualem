<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MangaDesk — Đọc Truyện</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:#0f0f11;color:#e8e6e0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0f0f11}::-webkit-scrollbar-thumb{background:#2a2a30;border-radius:3px}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{background:#18181c;border-bottom:1px solid #2a2a30;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-text{font-family:monospace;font-size:13px;letter-spacing:2px;color:#c8a96e;text-transform:uppercase}
.logo-sub{font-size:10px;color:#444;margin-left:8px}
#header-right{display:flex;align-items:center;gap:10px}
.user-email{font-size:11px;color:#555}
#content{flex:1;overflow-y:auto;padding:20px}

/* ── Tabs ── */
#tabs{display:flex;gap:0;border-bottom:1px solid #2a2a30;margin-bottom:20px;flex-shrink:0}
.tab-btn{padding:10px 18px;font-size:12px;cursor:pointer;color:#555;border:none;background:transparent;border-bottom:2px solid transparent;font-family:inherit;transition:color .15s;white-space:nowrap}
.tab-btn.active{color:#c8a96e;border-bottom-color:#c8a96e}
.tab-btn:hover{color:#e8e6e0}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;white-space:nowrap;user-select:none}
.btn-primary{background:#c8a96e;color:#18181c}.btn-primary:hover{background:#d4b87a}
.btn-ghost{background:transparent;border:1px solid #2a2a30;color:#888}.btn-ghost:hover{border-color:#555;color:#e8e6e0}
.btn-danger{background:transparent;border:1px solid #3a2020;color:#e05555}.btn-danger:hover{background:#3a2020}
.btn-sm{padding:5px 11px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px}

/* ── Comic grid ── */
.comic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.comic-card{background:#18181c;border:1px solid #2a2a30;border-radius:9px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.comic-card:hover{border-color:#c8a96e;transform:translateY(-2px)}
.comic-thumb{width:100%;aspect-ratio:2/3;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.comic-thumb img{width:100%;height:100%;object-fit:cover}
.comic-thumb-icon{font-size:28px;color:#333}
.comic-info{padding:8px 10px}
.comic-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comic-meta{font-size:10px;color:#555;margin-top:4px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{padding:1px 6px;border-radius:20px;font-size:9px}
.badge-genre{background:#1e1e24;color:#777;border:1px solid #2a2a30}

/* ── Section ── */
.section-title{font-family:monospace;font-size:13px;color:#c8a96e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title span{font-size:10px;color:#555;font-family:sans-serif;font-weight:400}
.empty-state{text-align:center;padding:48px 20px;color:#555;font-size:13px;line-height:1.9}

/* ── Continue reading cards ── */
.continue-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.continue-card{background:#18181c;border:1px solid #2a2a30;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.continue-card:hover{border-color:#c8a96e}
.continue-thumb{width:44px;height:60px;border-radius:5px;background:#111;object-fit:cover;flex-shrink:0}
.continue-thumb-icon{width:44px;height:60px;border-radius:5px;background:#1a1a1e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.continue-info{flex:1;min-width:0}
.continue-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.continue-chap{font-size:11px;color:#c8a96e;margin-top:3px}
.continue-time{font-size:10px;color:#555;margin-top:2px}
.continue-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Bookmark list ── */
.bookmark-list{display:flex;flex-direction:column;gap:8px}
.bookmark-card{background:#18181c;border:1px solid #2a2a30;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.bk-info{flex:1;min-width:0}
.bk-comic{font-size:12px;color:#888;margin-bottom:2px}
.bk-chap{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-note{font-size:11px;color:#555;margin-top:3px;font-style:italic}
.bk-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Search bar ── */
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{width:100%;background:#111;border:1px solid #2a2a30;border-radius:6px;padding:9px 12px 9px 34px;color:#e8e6e0;font-size:13px;outline:none;font-family:inherit}
.search-bar input:focus{border-color:#c8a96e}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#555;font-size:13px;pointer-events:none}

/* ── Genre filter pills ── */
.genre-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.genre-pill{padding:4px 12px;border-radius:20px;border:1px solid #2a2a30;font-size:11px;cursor:pointer;color:#666;background:transparent;font-family:inherit;transition:all .15s}
.genre-pill.active{border-color:#c8a96e;color:#c8a96e;background:#c8a96e11}
.genre-pill:hover{color:#e8e6e0;border-color:#555}

/* ── Reader overlay ── */
#reader{position:fixed;inset:0;background:#0a0a0b;z-index:200;display:none;flex-direction:column}
.rbar{padding:0 12px;background:#18181c;border-bottom:1px solid #2a2a30;display:flex;align-items:center;gap:8px;height:46px;flex-shrink:0;overflow:hidden}
.rtitle{font-family:monospace;font-size:11px;color:#c8a96e;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.rbar-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.bk-btn{padding:5px 10px;font-size:10px;border-radius:5px;border:1px solid #2a2a30;background:transparent;color:#888;cursor:pointer;font-family:monospace;transition:all .15s}
.bk-btn.active{border-color:#c8a96e;color:#c8a96e;background:#c8a96e11}
.bk-btn:hover{border-color:#555;color:#e8e6e0}
.mtog,.ltog{display:flex;border:1px solid #2a2a30;border-radius:5px;overflow:hidden;flex-shrink:0}
.mbtn,.lbtn{padding:5px 9px;font-size:10px;cursor:pointer;background:transparent;border:none;color:#555;font-family:monospace;transition:all .15s}
.mbtn.active{background:#2a2a30;color:#e8e6e0}
.lbtn.active{background:#c8a96e;color:#18181c;font-weight:600}
.zoom-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.zoom-label{font-size:10px;color:#555;font-family:monospace;white-space:nowrap}
.zoom-val{font-size:10px;color:#c8a96e;font-family:monospace;min-width:34px;text-align:right}
input[type=range].zoom-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:linear-gradient(to right,#c8a96e var(--p,50%),#2a2a30 var(--p,50%));outline:none;cursor:pointer;flex-shrink:0}
input[type=range].zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#c8a96e;cursor:pointer;border:none}
.rnav{padding:6px 12px;background:#111;border-bottom:1px solid #1e1e24;display:flex;align-items:center;gap:6px;flex-shrink:0}
.rni{font-size:10px;color:#666;font-family:monospace;min-width:76px;text-align:center}
.rj{display:flex;align-items:center;gap:4px;margin-left:auto}
.rjl{font-size:10px;color:#555}
.rji{width:46px;background:#18181c;border:1px solid #2a2a30;border-radius:4px;padding:4px 5px;color:#e8e6e0;font-size:10px;font-family:monospace;outline:none;text-align:center}
.rji:focus{border-color:#c8a96e}
.rscroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:12px;gap:2px}
.rpiw{max-width:680px;width:100%}
.rpl{font-size:9px;color:#2a2a30;font-family:monospace;margin-bottom:2px;align-self:flex-start;width:100%}
.rnoph{width:100%;aspect-ratio:3/4;background:#111;border:1px dashed #2a2a30;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#444;font-size:11px;max-width:680px}
.rsplit{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.rcol{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #1a1a20}
.rcol:last-child{border-right:none}
.rchdr{padding:6px 10px;background:#111;border-bottom:1px solid #1a1a20;font-size:10px;font-family:monospace;display:flex;align-items:center;gap:5px;flex-shrink:0}
.rcs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column}
.split-page{width:100%;display:flex;flex-direction:column;padding-bottom:6px}
.spl{font-size:8px;color:#2a2a30;font-family:monospace;padding:0 2px 2px;text-align:center}
.spno{width:100%;aspect-ratio:3/4;background:#111;border:1px dashed #1e1e24;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#333;font-size:10px}
.spblank{width:100%;aspect-ratio:3/4;background:#0d0d10;border:1px dashed #181820;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#222;font-size:9px}
.pdf-pages{display:flex;flex-direction:column;gap:0}
.pdf-pages canvas{height:auto;display:block}
.pdf-spin{display:flex;align-items:center;justify-content:center;padding:16px;color:#555;font-size:10px;gap:8px;min-height:40px}
.pdf-spin::before{content:'';width:14px;height:14px;border:2px solid #2a2a30;border-top-color:#c8a96e;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Text reader */
.tbar-langs{padding:7px 14px;background:#111;border-bottom:1px solid #1e1e24;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.lang-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid #2a2a30;cursor:pointer;font-size:11px;user-select:none;transition:border-color .15s;flex-shrink:0}
.lang-pill:has(input:checked){border-color:#c8a96e}
.lang-pill input{accent-color:#c8a96e}
#text-cols{flex:1;display:grid;overflow:hidden}
.text-col-wrap{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #1a1a20}
.text-col-wrap:last-child{border-right:none}
.text-col-hdr{padding:7px 16px;background:#111;border-bottom:1px solid #1a1a20;font-size:11px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.text-col{flex:1;overflow-y:auto;padding:18px 22px}
.tseg{padding:14px 0;border-bottom:1px solid #1a1a1e}
.tseg:last-child{border-bottom:none}
.tseg-note{font-size:10px;color:#555;font-style:italic;margin-bottom:5px}
.tseg-content{font-size:15px;line-height:1.9;color:#d4d0c8;white-space:pre-wrap;word-break:break-word}
.anno-phrase{cursor:pointer;border-bottom:1.5px dashed #c8a96e55;border-radius:2px;transition:background .12s}
.anno-phrase:hover{background:rgba(200,169,110,.14);border-bottom-color:#c8a96e}
.anno-tooltip{position:fixed;background:#1a1a1e;border:1px solid #3a3a44;border-radius:8px;padding:10px 14px;max-width:260px;min-width:120px;z-index:500;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none;display:none;font-size:12px}
.anno-tooltip-src{font-size:9px;color:#555;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;font-family:monospace}
.anno-tooltip-row{margin-bottom:5px}
.anno-tooltip-lang{font-size:9px;color:#666;margin-bottom:1px}
.anno-tooltip-text{font-size:13px;color:#e8e6e0;line-height:1.5}
.lt{font-size:9px;font-family:monospace;padding:1px 5px;border-radius:3px;display:inline-block}
.lvi{background:#1a2030;color:#6ab0f5;border:1px solid #2a3050}
.len{background:#1a2820;color:#6af59a;border:1px solid #2a4030}

#loading{position:fixed;inset:0;background:rgba(10,10,11,.85);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spinner{width:36px;height:36px;border:3px solid #2a2a30;border-top-color:#c8a96e;border-radius:50%;animation:spin .7s linear infinite}
.loading-msg{font-size:12px;color:#888;font-family:monospace}

/* ── Chapter list modal ── */
#chap-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.chap-modal-box{background:#18181c;border:1px solid #2a2a30;border-radius:10px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.chap-modal-hdr{padding:14px 18px;border-bottom:1px solid #2a2a30;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chap-modal-title{font-family:monospace;font-size:13px;color:#c8a96e}
.chap-modal-list{overflow-y:auto;padding:8px}
.chap-item{padding:10px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.chap-item:hover{background:#1f1f24}
.chap-item.last-read{background:#1a2030}
.chap-num{font-family:monospace;font-size:11px;color:#c8a96e;min-width:40px}
.chap-title{font-size:12px;flex:1}
.chap-type{font-size:9px;color:#555;padding:1px 5px;border-radius:3px;background:#1a1a1e;border:1px solid #2a2a30}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="logo-text">MangaDesk</span>
      <span class="logo-sub">Đọc truyện</span>
    </div>
    <div id="header-right">
      <button class="btn btn-ghost btn-xs" id="profile-btn" style="display:flex;align-items:center;gap:6px">
        <span style="width:22px;height:22px;border-radius:50%;background:#2a2a30;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;overflow:hidden" id="user-avatar">?</span>
        <span id="user-display-name" style="font-size:11px;color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </button>

    </div>
  </div>

  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <div id="tabs" style="padding:0 20px">
      <button class="tab-btn active" data-tab="home">🏠 Khám phá</button>
      <button class="tab-btn" data-tab="continue">▶ Tiếp tục đọc</button>
      <button class="tab-btn" data-tab="bookmarks">🔖 Bookmark</button>
      <button class="tab-btn" data-tab="account">👤 Tài khoản</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="reader"></div>
<div id="anno-tooltip" class="anno-tooltip"></div>
<div id="chap-modal"><div class="chap-modal-box" id="chap-modal-box"></div></div>
<div id="loading"><div class="spinner"></div><div class="loading-msg" id="loading-msg">Đang tải...</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/translate.js"></script>
<script src="js/pdf-module.js"></script>
<script src="js/user-db.js"></script>
<script src="js/user-app.js"></script>
<script>initUser();</script>
</body>
</html>
